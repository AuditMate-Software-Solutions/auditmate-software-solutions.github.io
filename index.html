<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AuditMate Software Solutions</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<section id="example-output">

<h2>Example Output (Windows)</h2>

<div class="terminal">
    <pre id="terminal-output"></pre>
</div>

</section>

<script>
const cleanOutput = [
".\\bin\\auditmate.exe",
"AuditMate",
"-----------------------------------",
"Hostname : hp",
"OS       : Microsoft Windows [Version 10.0.26200.8246]",
"Uptime   : Statistics since 4/22/2026 12:09:00 AM",
"",
"Users    : 3",
"Services : 127",
"Packages : 211",
"Ports    : 15",
"",
"Status   : Clean",
"-----------------------------------",
"Warnings : 0",
"Errors   : false",
"Reset    : false",
"Report   : auditmate-output\\audit.json",
"Duration : 3.0313884s",
"",
"PS Microsoft.PowerShell.Core\\FileSystem::\\\\wsl.localhost\\Ubuntu\\home\\ubuntu\\auditmate>"
];

const driftOutput = [
"",
"",
".\\bin\\auditmate.exe",
"AuditMate",
"-----------------------------------",
"Hostname : hp",
"OS       : Microsoft Windows [Version 10.0.26200.8246]",
"",
"Users    : 4",
"Services : 129",
"Packages : 211",
"Ports    : 17",
"",
"Status   : Drift detected",
"",
"Changes:",
" + Users:",
"   + hacker",
"",
" + Services:",
"   + sshd",
"   + remote-control",
"",
"-----------------------------------",
"Warnings : 1",
"Errors   : false",
"Reset    : false",
"Report   : auditmate-output\\audit.json",
"Duration : 3.331s",
"",
"PS Microsoft.PowerShell.Core\\FileSystem::\\\\wsl.localhost\\Ubuntu\\home\\ubuntu\\auditmate>"
];

const outputEl = document.getElementById("terminal-output");

let lineIndex = 0;
let charIndex = 0;
let currentLines = cleanOutput;

function type() {
    if (lineIndex >= currentLines.length) {
        if (currentLines === cleanOutput) {
            setTimeout(() => {
                currentLines = driftOutput;
                lineIndex = 0;
                charIndex = 0;
                type();
            }, 1200);
        }
        return;
    }

    const line = currentLines[lineIndex];

    if (charIndex < line.length) {
        outputEl.textContent += line.charAt(charIndex);
        charIndex++;
        setTimeout(type, 15);
    } else {
        outputEl.textContent += "\n";
        lineIndex++;
        charIndex = 0;
        setTimeout(type, 80);
    }
}

window.onload = type;
</script>

</body>
</html>
