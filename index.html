<section id="example-output">

<h2>Example Output (Windows)</h2>

<h3>Live Simulation</h3>

<div class="terminal">
    <div id="terminal-output"></div>
</div>

</section>

<script>
const lines = [
"C:\\> auditmate.exe",
"",
"AuditMate initializing...",
"Scanning system state...",
"Checking users...",
"Checking services...",
"Checking packages...",
"Checking open ports...",
"",
"Status: Clean",
"",
"Warnings: 0",
"Errors: false",
"Report: auditmate-output\\audit.json",
"Duration: 52ms"
];

let i = 0;
const output = document.getElementById("terminal-output");

function typeLine() {
    if (i >= lines.length) return;

    output.innerHTML += lines[i] + "\n";
    i++;

    setTimeout(typeLine, 350);
}

window.addEventListener("load", typeLine);
</script>
